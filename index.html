<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Fisher Electrical, Air and Solar - Professional trade services across Moreton Bay and South East Queensland."
        />
        <title>Fishereas</title>
        <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2" />
        <link rel="shortcut icon" href="favicon.svg?v=2" />

        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            rel="preload"
            href="public/fonts/Inter-Regular.woff2"
            as="font"
            type="font/woff2"
            crossorigin
        />
        <link
            rel="preload"
            href="public/fonts/Inter-Medium.woff2"
            as="font"
            type="font/woff2"
            crossorigin
        />
        <link
            rel="preload"
            href="public/fonts/Inter-SemiBold.woff2"
            as="font"
            type="font/woff2"
            crossorigin
        />
        <link
            rel="preload"
            href="public/fonts/Inter-Light.woff2"
            as="font"
            type="font/woff2"
            crossorigin
        />
        <link
            rel="preload"
            href="public/fonts/A_Space/A-Space Light Demo.otf"
            as="font"
            type="font/otf"
            crossorigin
        />

        <script src="js/htmx.min.js" defer></script>
        <link rel="stylesheet" href="css/styles.css" />
    </head>
    <body>
        <span class="logo animate">
            <img src="public/logos/logo.svg" alt="Fisher" />
        </span>
        <a
            href="tel:0456676808"
            class="header-link animate"
            hx-get="partials/phone-reveal.html"
            hx-trigger="mouseenter[window.innerWidth > 768]"
            hx-target="this"
            hx-swap="innerHTML"
            hx-on:mouseleave="if(!this.hasAttribute('data-locked')) this.innerText='Contact Us'"
            onclick="
                if (window.innerWidth > 768) {
                    if (this.hasAttribute('data-locked')) return true;
                    this.setAttribute('data-locked', 'true');
                    return false;
                }
            "
            >Contact Us</a
        >

        <main>
            <section class="hero">
                <h1 class="animate delay-1">
                    <span>FISHER</span>
                    <span>ELECTRICAL | AIR | SOLAR</span>
                </h1>
                <p class="tagline animate delay-2">
                    Professional electrical, air conditioning and solar services
                    for homes and businesses across Moreton Bay and South East
                    Queensland.
                </p>
            </section>

            <!-- HTMX Lazy Loaded Sections -->
            <div
                hx-get="partials/services.html"
                hx-trigger="intersect once"
                hx-swap="outerHTML"
                class="htmx-placeholder"
            ></div>

            <div
                hx-get="partials/contact.html"
                hx-trigger="intersect once"
                hx-swap="outerHTML"
                class="htmx-placeholder"
            ></div>
        </main>

        <footer>
            <div class="footer-group">
                <p class="footer-text">
                    &copy; 2026 Fisher Electrical, Air and Solar
                </p>
                <p class="footer-text">ABN 26 374 793 956</p>
            </div>
            <a href="https://kakarotdevs.com" class="dev-credit">
                <img src="public/logos/kakarot.png" alt="kakarotdevs" />
            </a>
        </footer>

        <script>
            document.addEventListener("DOMContentLoaded", () => {
                const observer = new IntersectionObserver(
                    (entries) => {
                        entries.forEach((entry) => {
                            if (entry.isIntersecting) {
                                entry.target.style.animationPlayState =
                                    "running";
                            }
                        });
                    },
                    { threshold: 0.1 },
                );

                const observeElements = () => {
                    document.querySelectorAll(".animate").forEach((el) => {
                        if (el.style.animationPlayState !== "running") {
                            el.style.animationPlayState = "paused";
                            observer.observe(el);
                        }
                    });
                };

                observeElements();

                // Re-observe when htmx adds content
                document.body.addEventListener("htmx:afterSwap", (evt) => {
                    observeElements();
                    shuffleGalleries();
                });

                function shuffleGalleries() {
                    const tracks = document.querySelectorAll(".gallery-track");
                    tracks.forEach((track) => {
                        const images = Array.from(track.children);
                        for (let i = images.length - 1; i > 0; i--) {
                            const j = Math.floor(Math.random() * (i + 1));
                            track.appendChild(images[j]);
                        }
                    });

                    document.querySelectorAll('.services-item').forEach(item => {
                        const track = item.querySelector('.gallery-track');
                        if (!track) return;

                        // 1. IMPROVED SCROLL LOGIC (Natural vertical, smooth horizontal)
                        track.addEventListener('wheel', (e) => {
                            // Only intercept if the user is scrolling significantly horizontally
                            // OR if they are using a trackpad sideways swipe (deltaX)
                            const isHorizontalIntent = Math.abs(e.deltaX) > Math.abs(e.deltaY);
                            
                            if (isHorizontalIntent) {
                                e.preventDefault();
                                track.scrollLeft += e.deltaX;
                            }
                            // Otherwise, let the vertical scroll bubble up to the body
                        }, { passive: false });

                        // 2. DRAG TO SCROLL WITH MOMENTUM
                        let isDown = false;
                        let startX;
                        let scrollLeft;
                        let isDragging = false;

                        track.addEventListener('mousedown', (e) => {
                            isDown = true;
                            isDragging = false;
                            track.classList.add('grabbing');
                            startX = e.pageX - track.offsetLeft;
                            scrollLeft = track.scrollLeft;
                        });

                        const endDrag = () => {
                            isDown = false;
                            track.classList.remove('grabbing');
                        };
                        track.addEventListener('mouseleave', endDrag);
                        track.addEventListener('mouseup', endDrag);

                        track.addEventListener('mousemove', (e) => {
                            if (!isDown) return;
                            const x = e.pageX - track.offsetLeft;
                            const walk = (x - startX) * 2;
                            if (Math.abs(walk) > 5) {
                                isDragging = true;
                                e.preventDefault();
                                track.scrollLeft = scrollLeft - walk;
                            }
                        });

                        // 3. MAGNIFICATION / FOCUS EFFECT
                        const updateFocus = () => {
                            const trackRect = track.getBoundingClientRect();
                            const trackCenter = trackRect.left + trackRect.width / 2;
                            
                            track.querySelectorAll('.gallery-image').forEach(img => {
                                const imgRect = img.getBoundingClientRect();
                                const imgCenter = imgRect.left + imgRect.width / 2;
                                const distance = Math.abs(trackCenter - imgCenter);
                                const proximity = 1 - Math.min(1, distance / (trackRect.width / 1.5));
                                
                                // Apply focus class based on proximity for styling
                                if (proximity > 0.8) {
                                    img.classList.add('is-focused');
                                } else {
                                    img.classList.remove('is-focused');
                                }
                            });
                        };

                        track.addEventListener('scroll', updateFocus);
                        window.addEventListener('resize', updateFocus);
                        
                        // 4. CLEANER ACCORDION LOGIC
                        item.addEventListener('click', (e) => {
                            // Don't toggle if we were dragging or if clicking inside a revealed track
                            if (isDragging) return;
                            if (e.target.closest('.gallery-track') && item.classList.contains('active')) return;

                            const isActive = item.classList.contains('active');
                            
                            // Close all
                            document.querySelectorAll('.services-item').forEach(el => {
                                el.classList.remove('active');
                                el.querySelectorAll('.gallery-image').forEach(img => {
                                    img.style.transitionDelay = '0s';
                                });
                            });
                            
                            if (!isActive) {
                                item.classList.add('active');
                                // Stagger entrance
                                track.querySelectorAll('.gallery-image').forEach((img, index) => {
                                    img.style.transitionDelay = `${0.1 + (index * 0.05)}s`;
                                });
                                // Reset position
                                setTimeout(() => {
                                    track.scrollLeft = 0;
                                    updateFocus();
                                }, 100);
                            }
                        });
                    });
                }

                    });

                    // Add click listeners for accordion exclusivity
                    document.querySelectorAll('.services-item').forEach(item => {
                        const track = item.querySelector('.gallery-track');
                        
                        // Handle mouse wheel horizontal scroll
                        if (track) {
                            track.addEventListener('wheel', (e) => {
                                if (Math.abs(e.deltaX) > Math.abs(e.deltaY)) {
                                    e.preventDefault();
                                    track.scrollLeft += e.deltaX;
                                }
                                // If vertical scroll (deltaY), we do NOT preventDefault
                                // so the page can scroll naturally.
                            }, { passive: false });

                            // Drag to scroll
                            let isDown = false;
                            let startX;
                            let scrollLeft;
                            let isDragging = false;

                            track.addEventListener('mousedown', (e) => {
                                isDown = true;
                                isDragging = false;
                                track.classList.add('grabbing');
                                startX = e.pageX - track.offsetLeft;
                                scrollLeft = track.scrollLeft;
                            });
                            track.addEventListener('mouseleave', () => {
                                isDown = false;
                                track.classList.remove('grabbing');
                            });
                            track.addEventListener('mouseup', (e) => {
                                isDown = false;
                                track.classList.remove('grabbing');
                            });
                            track.addEventListener('mousemove', (e) => {
                                if (!isDown) return;
                                
                                const x = e.pageX - track.offsetLeft;
                                const walk = (x - startX) * 2;
                                if (Math.abs(walk) > 5) {
                                    isDragging = true;
                                    e.preventDefault();
                                    track.scrollLeft = scrollLeft - walk;
                                }
                            });
                            
                            // Block accordion toggle if dragging occurred
                            item.addEventListener('click', (e) => {
                                if (isDragging) {
                                    e.preventDefault();
                                    e.stopPropagation();
                                }
                            }, true);
                        }

                        item.onclick = function() {
                            const isActive = this.classList.contains('active');
                            document.querySelectorAll('.services-item').forEach(el => {
                                el.classList.remove('active');
                                // Reset image styles when closing
                                el.querySelectorAll('.gallery-image').forEach(img => {
                                    img.style.transitionDelay = '0s';
                                });
                            });
                            
                            if (!isActive) {
                                this.classList.add('active');
                                const track = this.querySelector('.gallery-track');
                                if (track) {
                                    const images = Array.from(track.children);
                                    // Shuffle
                                    for (let i = images.length - 1; i > 0; i--) {
                                        const j = Math.floor(Math.random() * (i + 1));
                                        track.appendChild(images[j]);
                                    }
                                    // Staggered reveal delay
                                    track.querySelectorAll('.gallery-image').forEach((img, index) => {
                                        img.style.transitionDelay = `${0.1 + (index * 0.05)}s`;
                                    });
                                    track.scrollLeft = 0;
                                }
                            }
                        };
                    });
                }

                // Initial shuffle
                shuffleGalleries();
            });
        </script>
    </body>
</html>
